syntax = "proto3";

package maggie.v1;

option go_package = "github.com/chazu/maggie/gen/maggie/v1;maggiev1";

service SyncService {
  // Announce advertises a set of content hashes to a peer.
  // The peer responds with which hashes it wants.
  rpc Announce(AnnounceRequest) returns (AnnounceResponse);

  // Transfer sends requested chunks to a peer.
  rpc Transfer(TransferRequest) returns (TransferResponse);

  // Serve returns content from a root hash, minus what the requester already has.
  // Used by pull: the requester sends a root hash and its local hashes,
  // the server responds with the missing chunks.
  rpc Serve(ServeRequest) returns (ServeResponse);

  // Ping checks service liveness.
  rpc Ping(PingRequest) returns (PingResponse);

  // Resolve maps a class name (FQN) to its content hash.
  rpc Resolve(ResolveRequest) returns (ResolveResponse);

  // List enumerates all content in the local store.
  rpc List(ListRequest) returns (ListResponse);

  // DeliverMessage delivers a message to a process on this node.
  // The message payload is a CBOR-encoded MessageEnvelope containing
  // a signed, serialized Maggie value.
  rpc DeliverMessage(DeliverMessageRequest) returns (DeliverMessageResponse);

  // MonitorProcess asks this node to monitor a process on behalf of
  // a remote watcher. DOWN notifications are sent via DeliverMessage.
  rpc MonitorProcess(MonitorProcessRequest) returns (MonitorProcessResponse);

  // DemonitorProcess cancels a previously established remote monitor.
  rpc DemonitorProcess(DemonitorProcessRequest) returns (DemonitorProcessResponse);

  // SpawnProcess executes a serialized block on this node.
  rpc SpawnProcess(SpawnProcessRequest) returns (SpawnProcessResponse);

  // ChannelSend sends a value to an exported channel (blocking).
  rpc ChannelSend(ChannelSendRequest) returns (ChannelSendResponse);

  // ChannelReceive receives a value from an exported channel (blocking).
  rpc ChannelReceive(ChannelReceiveRequest) returns (ChannelReceiveResponse);

  // ChannelTrySend attempts a non-blocking send.
  rpc ChannelTrySend(ChannelSendRequest) returns (ChannelTrySendResponse);

  // ChannelTryReceive attempts a non-blocking receive.
  rpc ChannelTryReceive(ChannelReceiveRequest) returns (ChannelTryReceiveResponse);

  // ChannelClose closes an exported channel.
  rpc ChannelClose(ChannelCloseRequest) returns (ChannelCloseResponse);

  // ChannelStatus returns the status of an exported channel.
  rpc ChannelStatus(ChannelStatusRequest) returns (ChannelStatusResponse);
}

message DeliverMessageRequest {
  bytes envelope = 1;  // CBOR-encoded MessageEnvelope
}

message DeliverMessageResponse {
  bool success = 1;
  string error_kind = 2;      // error kind: processNotFound, mailboxFull, signatureInvalid, etc.
  string error_message = 3;   // human-readable error description
  bytes response_payload = 4; // CBOR-encoded response value (for request-response pattern)
}

message AnnounceRequest {
  bytes root_hash = 1;          // 32-byte root content hash
  repeated bytes all_hashes = 2; // all hashes in the transitive closure
  bytes capability_manifest = 3; // CBOR-encoded CapabilityManifest (optional)
  uint32 hash_version = 4;      // compiler/hash version for compatibility
}

enum AnnounceStatus {
  ANNOUNCE_STATUS_UNSPECIFIED = 0;
  ANNOUNCE_ACCEPTED = 1;
  ANNOUNCE_REJECTED = 2;
  ANNOUNCE_ALREADY_HAVE = 3;
}

message AnnounceResponse {
  AnnounceStatus status = 1;
  repeated bytes want = 2;       // hashes the receiver wants
  string reject_reason = 3;      // set when status = REJECTED
}

message TransferRequest {
  repeated bytes chunks = 1;     // each element is a CBOR-encoded Chunk
}

message TransferResponse {
  int32 accepted = 1;
  int32 rejected = 2;
  repeated bytes failed_hashes = 3; // hashes that failed verification
}

message ServeRequest {
  bytes root_hash = 1;          // 32-byte root hash to serve from
  repeated bytes have = 2;      // hashes the requester already has
}

message ServeResponse {
  repeated bytes available = 1; // all hashes in the transitive closure
  repeated bytes chunks = 2;    // CBOR-encoded chunks (minus what requester has)
}

message PingRequest {}

message PingResponse {
  int64 content_count = 1;  // number of hashes in local content store
}

message ResolveRequest {
  string class_name = 1;  // FQN like "MyApp::Greeter"
}

message ResolveResponse {
  bytes root_hash = 1;    // 32-byte hash of the class digest
  bool found = 2;
}

message ListRequest {}

message ListResponse {
  repeated bytes method_hashes = 1;
  repeated bytes class_hashes = 2;
  repeated string class_names = 3;  // parallel with class_hashes for display
}

// --- Cross-node monitors ---

message MonitorProcessRequest {
  bytes sender_node = 1;       // 32-byte public key of requesting node
  uint64 watcher_id = 2;       // process ID on the requesting node
  string target_name = 3;      // registered name of process to monitor
  uint64 target_id = 4;        // OR process ID (name takes precedence)
  uint64 monitor_ref_id = 5;   // ref ID allocated by the requesting node
}

message MonitorProcessResponse {
  bool success = 1;
  string error_kind = 2;
  string error_message = 3;
  bool already_dead = 4;
  string exit_signal = 5;
  bool exit_normal = 6;
}

message DemonitorProcessRequest {
  bytes sender_node = 1;
  uint64 monitor_ref_id = 2;
}

message DemonitorProcessResponse {
  bool success = 1;
}

// --- Remote process spawning ---

message SpawnProcessRequest {
  bytes envelope = 1;       // signed MessageEnvelope containing SpawnBlock payload
}

message SpawnProcessResponse {
  bool accepted = 1;
  string error = 2;           // non-empty if rejected
  string process_name = 3;    // registered name of spawned process
}

// --- Distributed channels ---

message ChannelSendRequest {
  uint64 channel_id = 1;
  bytes value = 2;          // CBOR-serialized Maggie value
}

message ChannelSendResponse {
  bool success = 1;
  string error = 2;
}

message ChannelReceiveRequest {
  uint64 channel_id = 1;
}

message ChannelReceiveResponse {
  bool success = 1;
  bytes value = 2;          // CBOR-serialized Maggie value
  bool channel_open = 3;   // false if channel was closed
  string error = 4;
}

message ChannelTrySendResponse {
  bool sent = 1;            // true if the value was accepted
  string error = 2;
}

message ChannelTryReceiveResponse {
  bool got_value = 1;       // true if a value was received
  bytes value = 2;
  bool channel_open = 3;
  string error = 4;
}

message ChannelCloseRequest {
  uint64 channel_id = 1;
}

message ChannelCloseResponse {
  bool success = 1;
}

message ChannelStatusRequest {
  uint64 channel_id = 1;
}

message ChannelStatusResponse {
  int32 size = 1;
  int32 capacity = 2;
  bool closed = 3;
}
