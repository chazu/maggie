name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - name: Download dependencies
        run: go mod download

      - name: Run tests with race detector and coverage
        run: go test -race -coverprofile=coverage.out ./...

      - name: Display coverage summary
        run: go tool cover -func=coverage.out

      - name: Check coverage threshold
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          if [ -z "$TOTAL" ]; then
            echo "ERROR: Could not parse coverage percentage"
            exit 1
          fi
          THRESHOLD=40
          if echo "$TOTAL $THRESHOLD" | awk '{exit !($1 < $2)}'; then
            echo "FAIL: Coverage ${TOTAL}% is below the ${THRESHOLD}% threshold"
            exit 1
          fi
          echo "OK: Coverage ${TOTAL}% meets the ${THRESHOLD}% threshold"

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - name: Run go vet
        run: go vet ./...

  staticcheck:
    name: Staticcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - name: Run staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"

  doctest:
    name: Doctests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - name: Build mag
        run: go build -o mag ./cmd/mag/

      - name: Run library doctests
        run: ./mag doctest lib/

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - name: Run fuzz tests
        run: |
          # Fuzz every package that defines targets. vm/ carries the image and
          # CBOR/envelope decoders (untrusted-input surface); compiler/ carries
          # the lexer/parser targets. Split the 5-minute budget per target.
          FUZZ_PKGS="./compiler/ ./vm/ ./vm/dist/"
          FOUND=0
          for PKG in $FUZZ_PKGS; do
            TARGETS=$(grep -rh '^func Fuzz' ${PKG}*_test.go 2>/dev/null | sed 's/.*func \(Fuzz[a-zA-Z0-9_]*\).*/\1/' || true)
            for TARGET in $TARGETS; do
              FOUND=1
              echo "--- Fuzzing $TARGET in $PKG for 3 minutes ---"
              go test -fuzz="^${TARGET}$" -fuzztime=3m "$PKG"
            done
          done
          if [ "$FOUND" = "0" ]; then
            echo "No fuzz targets found -- skipping"
          fi
